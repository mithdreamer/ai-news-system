name: Daily AI News

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore persistent archive
        shell: bash
        run: |
          mkdir -p data/raw
          mkdir -p outputs/html

          if [ -d archive-store/raw ]; then
            cp -r archive-store/raw/. data/raw/
          fi

          if [ -d archive-store/html ]; then
            cp -r archive-store/html/. outputs/html/
          fi

          rm -f data/raw/.gitkeep
          rm -f outputs/html/.gitkeep

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI News System
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEWSLETTER_TO: ${{ secrets.NEWSLETTER_TO }}
          NEWSLETTER_FROM: "AI News <onboarding@resend.dev>"
          SEND_NEWSLETTER: "true"
        run: python src/main.py
      
      - name: Save persistent archive
        shell: bash
        run: |
          mkdir -p archive-store/raw
          mkdir -p archive-store/html

          cp data/raw/*-news.json archive-store/raw/ 2>/dev/null || true
          cp outputs/html/*-news.html archive-store/html/ 2>/dev/null || true

          cd archive-store

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add raw html

          if git diff --cached --quiet; then
            echo "Arşivde yeni değişiklik yok."
          else
            git commit -m "Update persistent news archive"
            git push origin archive-data
          fi
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build-news
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
