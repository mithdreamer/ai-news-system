<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Günün Haberleri</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 40px auto;
            line-height: 1.6;
        }

        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            border: 1px solid #ddd;
            padding: 12px 20px;
            border-radius: 8px;
            min-width: 140px;
            background: #f7f7f7;
        }

        .stat-card strong {
            display: block;
            color: #444;
        }

        .stat-card span {
            font-size: 28px;
            font-weight: bold;
        }

        .featured-list {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px 24px;
            background: #fafafa;
            margin-bottom: 35px;
        }

        .featured-list li {
            margin-bottom: 8px;
        }

        .category-title {
            margin-top: 40px;
            border-bottom: 2px solid #222;
            padding-bottom: 6px;
        }

        .news-card {
            border: 1px solid #ddd;
            padding: 16px;
            margin-bottom: 16px;
            border-radius: 8px;
        }

        .news-card h3 {
            margin-top: 0;
        }

        .source {
            font-size: 13px;
            color: #777;
            margin-bottom: 8px;
        }

        a {
            color: #0066cc;
        }
        .search-box {
    margin: 25px 0;
    }

        .search-box input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

            .category-filters {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin: 20px 0 30px;
            }

            .category-filter-btn {
                padding: 8px 14px;
                border: 1px solid #ddd;
                border-radius: 999px;
                background: #f7f7f7;
                cursor: pointer;
            }

            .category-filter-btn.active {
                background: #222;
                color: white;
            }
    </style>
</head>
