<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Haber Arama</title>
</head>
<body>

  <h1>Haber Arama</h1>

  <input
    type="text"
    id="search-input"
    placeholder="Başlık, konu, kategori veya kaynak ara..."
  >

  <div id="search-results"></div>

  <script>
    const searchInput = document.querySelector("#search-input");
    const resultsContainer = document.querySelector("#search-results");

    let newsData = [];

    fetch("data/index/search-index.json")
      .then(response => response.json())
      .then(data => {
        newsData = data;
        showResults(newsData);
      });

    function showResults(items) {
      resultsContainer.innerHTML = "";

      items.forEach(item => {
        const card = document.createElement("div");

        card.innerHTML = `
          <h2>${item.title}</h2>
          <p>${item.summary}</p>
          <p>
            <strong>Kategori:</strong> ${item.category || "genel"}
            |
            <strong>Kaynak:</strong> ${item.source || ""}
          </p>
          <a href="${item.link}" target="_blank">
            Haberi Oku
          </a>
          <hr>
        `;

        resultsContainer.appendChild(card);
      });
    }

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.toLowerCase();

      const filteredNews = newsData.filter(item => {
        const text = `
          ${item.title || ""}
          ${item.summary || ""}
          ${item.category || ""}
          ${item.source || ""}
          ${item.published || ""}
        `.toLowerCase();

        return text.includes(query);
      });

      showResults(filteredNews);
    });
  </script>

</body>
</html>
